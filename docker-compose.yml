services:
  web:
    # Image is built & pushed to GHCR by GitHub Actions (.github/workflows/deploy.yml);
    # the VPS only PULLS — never builds locally. Watchtower watches the `latest` tag and
    # redeploys this container when the digest changes.
    #
    # Pangolin fronts TLS/hostname/WAF and proxies aetherengine.superuser404.de to this
    # container BY NAME on the shared `pangolin` network (route target
    # http://aetherengine-web:8080). Therefore: join `pangolin`, publish NO host port
    # (host :8080 is already taken by CrowdSec), and keep the container name in sync with
    # the Pangolin resource target.
    image: ghcr.io/superuser404notfound/aetherengine-website:latest
    container_name: aetherengine-web
    restart: unless-stopped
    pull_policy: always
    networks:
      - pangolin
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 32m
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  pangolin:
    external: true
